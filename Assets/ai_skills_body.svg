<svg viewBox="0 0 900 410" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <defs>
    <radialGradient id="haloGray" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#555555" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#555555" stop-opacity="0"/>
    </radialGradient>
    <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="410" fill="#ffffff"/>

  <!-- ===================== STAGE HEADERS ===================== -->
  <rect x="14" y="20" width="168" height="44" rx="3" fill="#1a1a1a"/>
  <text x="98" y="40" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" letter-spacing="1.5">ALIGN</text>
  <text x="98" y="56" text-anchor="middle" fill="#999999" font-size="10">Wks 1&#8211;2</text>

  <rect x="190" y="20" width="168" height="44" rx="3" fill="#1a1a1a"/>
  <text x="274" y="40" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" letter-spacing="1.5">DISCOVER</text>
  <text x="274" y="56" text-anchor="middle" fill="#999999" font-size="10">Wks 3&#8211;4</text>

  <rect x="366" y="20" width="168" height="44" rx="3" fill="#1a1a1a"/>
  <text x="450" y="40" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" letter-spacing="1.5">CO-INNOVATE</text>
  <text x="450" y="56" text-anchor="middle" fill="#999999" font-size="10">Wks 5&#8211;6</text>

  <rect x="542" y="20" width="168" height="44" rx="3" fill="#1a1a1a"/>
  <text x="626" y="40" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" letter-spacing="1.5">SOLUTION</text>
  <text x="626" y="56" text-anchor="middle" fill="#999999" font-size="10">Wks 7&#8211;8</text>

  <rect x="718" y="20" width="168" height="44" rx="3" fill="#1a1a1a"/>
  <text x="802" y="40" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" letter-spacing="1.5">TRANSITION</text>
  <text x="802" y="56" text-anchor="middle" fill="#999999" font-size="10">Wk 8</text>

  <!-- ===================== DENSITY HALOS (skill count, not named) ===================== -->
  <circle cx="98" cy="170" r="34" fill="url(#haloGray)"/>
  <circle cx="274" cy="170" r="62" fill="url(#haloGray)"/>
  <circle cx="450" cy="170" r="46" fill="url(#haloGray)"/>
  <circle cx="626" cy="170" r="46" fill="url(#haloGray)"/>
  <circle cx="802" cy="170" r="34" fill="url(#haloGray)"/>

  <!-- particles: count encodes number of skills per stage, unlabeled -->
  <!-- Align: 1 -->
  <circle cx="98" cy="170" r="7" fill="#1a1a1a" filter="url(#dotGlow)"/>

  <!-- Discover: 4 -->
  <circle cx="252" cy="150" r="6" fill="#1a1a1a" filter="url(#dotGlow)"/>
  <circle cx="292" cy="192" r="7" fill="#1a1a1a" filter="url(#dotGlow)"/>
  <circle cx="258" cy="196" r="5" fill="#1a1a1a" filter="url(#dotGlow)"/>
  <circle cx="296" cy="150" r="5.5" fill="#1a1a1a" filter="url(#dotGlow)"/>

  <!-- Co-Innovate: 2 -->
  <circle cx="450" cy="155" r="7" fill="#1a1a1a" filter="url(#dotGlow)"/>
  <circle cx="450" cy="192" r="6.5" fill="#1a1a1a" filter="url(#dotGlow)"/>

  <!-- Solution: 2 -->
  <circle cx="626" cy="155" r="6.5" fill="#1a1a1a" filter="url(#dotGlow)"/>
  <circle cx="626" cy="192" r="7" fill="#1a1a1a" filter="url(#dotGlow)"/>

  <!-- Transition: 1 -->
  <circle cx="802" cy="170" r="7" fill="#1a1a1a" filter="url(#dotGlow)"/>

  <!-- ===================== CROSS-STAGE THREADS (only color accent) ===================== -->
  <path d="M98,170 Q274,55 450,155" fill="none" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="3,4" opacity="0.85"/>
  <path d="M450,192 Q538,285 626,155" fill="none" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="3,4" opacity="0.85"/>

  <!-- ===================== FOOTER STAT BAR ===================== -->
  <line x1="14" y1="300" x2="886" y2="300" stroke="#e8e8e8" stroke-width="1"/>

  <rect x="14" y="320" width="872" height="70" rx="3" fill="#1a1a1a"/>
  <text x="14" y="316" fill="#bbbbbb" font-size="8.5" font-weight="700" letter-spacing="2.5">WHAT THE CHAIN CARRIES</text>

  <text x="120" y="352" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700">8</text>
  <text x="120" y="368" text-anchor="middle" fill="#888888" font-size="9">AI SKILLS</text>

  <text x="320" y="352" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700">5</text>
  <text x="320" y="368" text-anchor="middle" fill="#888888" font-size="9">SPRINT STAGES</text>

  <text x="520" y="352" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700">2</text>
  <text x="520" y="368" text-anchor="middle" fill="#888888" font-size="9">SKILLS THAT CARRY ACROSS STAGES</text>

  <text x="740" y="352" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700">3</text>
  <text x="740" y="368" text-anchor="middle" fill="#888888" font-size="9">CLIENT-FACING DELIVERABLES</text>

</svg>
